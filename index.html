<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1c5d99">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Tournée Clients — Souss-Massa</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f4f6f8;--card:#fff;--pri:#1c5d99;--pri2:#16456f;--ok:#1e8e3e;--warn:#e8710a;--bad:#c5221f;--mut:#5f6b7a;--line:#e3e8ee}
html,body{margin:0;padding:0;background:var(--bg);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1a2330}
header{position:sticky;top:0;z-index:20;background:var(--pri);color:#fff;padding:10px 12px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
header h1{margin:0;font-size:16px;font-weight:700}
.sub{font-size:11px;opacity:.85;margin-top:2px}
.tabs{display:flex;gap:6px;margin-top:8px}
.tab{flex:1;text-align:center;padding:8px 4px;border-radius:9px;background:rgba(255,255,255,.15);color:#fff;font-weight:600;font-size:12.5px;cursor:pointer}
.tab.on{background:#fff;color:var(--pri)}
.controls{padding:10px 12px;background:var(--card);border-bottom:1px solid var(--line)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
select,button,input{font-size:14px;font-family:inherit}
select,input[type=number]{padding:9px;border:1px solid var(--line);border-radius:10px;background:#fff}
select{flex:1;min-width:120px}
.btn{border:0;border-radius:10px;padding:9px 12px;background:var(--pri);color:#fff;font-weight:600;cursor:pointer}
.btn.sec{background:#eef2f6;color:var(--pri2)} .btn.sm{padding:7px 9px;font-size:12px;border-radius:8px}
.btn.ok{background:var(--ok)} .btn.warn{background:var(--warn)} .btn.bad{background:var(--bad)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{font-size:12px;padding:6px 10px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--mut);cursor:pointer;user-select:none}
.chip.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.list{padding:10px 12px 96px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card.done{opacity:.6}
.ctop{display:flex;justify-content:space-between;gap:8px}
.nom{font-weight:700;font-size:15px;line-height:1.25}
.meta{font-size:12px;color:var(--mut);margin-top:3px}
.refline{font-size:12px;color:var(--pri2);margin-top:6px;background:#f3f7fc;border-radius:8px;padding:6px 8px}
.dist{font-weight:700;color:var(--pri);white-space:nowrap;font-size:14px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.b{font-size:10.5px;font-weight:700;padding:3px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.b.pa{background:#fde7e6;color:var(--bad)} .b.pb{background:#fef0e0;color:var(--warn)} .b.pc{background:#eef2f6;color:var(--mut)} .b.pin{background:#ede7f6;color:#5b3a9e}
.b.ferme{background:#fde7e6;color:var(--bad)} .b.rdv{background:#e7f0fb;color:var(--pri)} .b.revis{background:#fef0e0;color:var(--warn)} .b.visite{background:#e3f4e8;color:var(--ok)}
.b.approx{background:#fff7e0;color:#9a6b00} .b.exact{background:#e3f4e8;color:var(--ok)}
.b.alert{background:#fde7e6;color:var(--bad)} .b.good{background:#e3f4e8;color:var(--ok)} .b.live{background:#e3f4e8;color:var(--ok)}
.b.stat{background:#eef4fb;color:var(--pri2)} .b.retard{background:#fff0e0;color:#9a5b00} .b.reconq{background:#ede7f6;color:#5b3a9e} .b.eros{background:#fde7e0;color:#b5480a}
.b.hausse{background:#e3f4e8;color:var(--ok)} .b.baisse{background:#fdecea;color:var(--bad)} .b.nouveau{background:#e7f0fb;color:var(--pri)}
.acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.acts .btn{flex:1;min-width:84px;text-align:center}
.nav{background:var(--ok)} .panel{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;display:none}
.panel.open{display:block}
.fld{display:flex;gap:6px;align-items:center;margin:6px 0;font-size:12px;color:var(--mut)}
.fld label{min-width:78px}
.fld input,.fld textarea,.fld select{flex:1;padding:7px;border:1px solid var(--line);border-radius:8px;font-size:13px}
.empty{text-align:center;color:var(--mut);padding:40px 10px;font-size:14px}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#1a2330;color:#fff;padding:10px 16px;border-radius:24px;font-size:13px;opacity:0;transition:.25s;z-index:50;pointer-events:none}
.toast.show{opacity:.96}
.foot{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;gap:8px;padding:8px 12px;z-index:18}
.foot .btn{flex:1}
.count{font-size:12px;color:var(--mut);padding:6px 12px 0}
.hotel{font-size:12px;color:var(--pri2);background:#eef4fb;border:1px solid #d3e3f5;border-radius:10px;padding:8px 10px;margin-top:8px}
.dayhdr{display:flex;justify-content:space-between;align-items:center;background:var(--pri);color:#fff;border-radius:12px 12px 0 0;padding:10px 12px;font-weight:700;font-size:14px;cursor:pointer}
.daybox{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:#fff}
.stop{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-bottom:1px solid #eef2f6}
.stop:last-child{border-bottom:0}
.snum{background:#eef4fb;color:var(--pri2);font-weight:800;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.sbody{flex:1} .sleg{font-size:11px;color:var(--mut)}
.daybody{display:none} .daybody.open{display:block}
.help{font-size:11px;color:var(--mut);margin:4px 0 0}
.live{background:#e3f4e8;border:1px solid #b7e2c4;border-radius:10px;padding:8px 10px;font-size:13px;color:var(--ok);font-weight:600;margin:6px 0}
.hist{font-size:11.5px;color:var(--mut);margin-top:8px;border-top:1px dotted var(--line);padding-top:6px}
.hist .hl{display:flex;justify-content:space-between;padding:2px 0}
.kpis{display:flex;gap:8px;padding:10px 12px;flex-wrap:wrap}
.kpi{flex:1;min-width:82px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.kpi .v{font-size:18px;font-weight:800;color:var(--pri2)} .kpi .l{font-size:11px;color:var(--mut);margin-top:2px}
table.dash{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:12px}
table.dash th,table.dash td{padding:7px 5px;border-bottom:1px solid #eef2f6;text-align:center}
table.dash th{background:#eef4fb;color:var(--pri2);font-size:10.5px}
table.dash td.l{text-align:left} table.dash tr:last-child td{border-bottom:0}
.rowalert{background:#fdeceb}
</style>
</head>
<body>

<div id="lockscreen" style="position:fixed;inset:0;z-index:999;background:#1c5d99;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center">
  <div style="font-size:42px">🔒</div>
  <h2 style="margin:10px 0 4px;font-size:18px">Tournée Clients</h2>
  <div style="font-size:13px;opacity:.85;margin-bottom:18px">Données protégées — entrez votre code</div>
  <input id="pin" type="password" inputmode="text" placeholder="Code d'accès" autocomplete="off" style="width:100%;max-width:300px;padding:13px;border:0;border-radius:12px;font-size:16px;text-align:center">
  <label style="display:flex;align-items:center;gap:8px;font-size:12px;margin:14px 0;opacity:.9"><input type="checkbox" id="remember"> Rester déverrouillé sur cet appareil</label>
  <button id="unlockBtn" style="width:100%;max-width:300px;padding:13px;border:0;border-radius:12px;background:#1e8e3e;color:#fff;font-weight:700;font-size:16px;cursor:pointer">Déverrouiller</button>
  <div id="pinErr" style="color:#ffd5d2;font-size:13px;margin-top:12px;min-height:18px"></div>
</div>

<header>
  <h1>📍 Tournée Clients — Souss-Massa</h1>
  <div class="sub" id="posinfo">Position : non activée</div>
  <div class="tabs">
    <div class="tab on" data-tab="today">📆 Aujourd'hui</div>
    <div class="tab" data-tab="camp">🗓️ Campagne</div>
    <div class="tab" data-tab="ana">📊 Analyse</div>
  </div>
</header>

<div id="view-today">
  <div class="controls">
    <div class="row"><select id="zone"></select><button class="btn" id="locBtn">📡 Ma position</button></div>
    <div class="row" style="margin-top:8px"><button class="btn sec" id="addBtn" style="width:100%">➕ Nouveau client / prospect</button></div>
    <div class="chips" id="filters">
      <span class="chip" data-f="open">Ouverts maintenant</span>
      <span class="chip" data-f="hidevis">Masquer visités</span>
      <span class="chip" data-f="prio">🎯 Tri priorité</span>
      <span class="chip" data-f="retard">⏰ En retard</span>
      <span class="chip" data-f="prioA">Segment A</span>
    </div>
  </div>
  <div class="count" id="count"></div>
  <div class="list" id="list"></div>
</div>

<div id="view-camp" style="display:none">
  <div class="controls">
    <div class="row"><select id="czone"></select></div>
    <div class="row" style="margin-top:8px">
      <button class="btn ok" id="hotelBtn" style="flex:2">🏨 Je suis à l'hôtel</button>
      <button class="btn sec sm" id="hotelPaste">Coller GPS</button></div>
    <div class="hotel" id="hotelInfo">Hôtel (point de départ) : non défini</div>
    <div class="row" style="margin-top:8px">
      <label class="help" style="flex:1">Durée
        <select id="cdays"><option value="5">5 jours</option><option value="6">6 jours</option><option value="12">12 jours</option><option value="15">15 jours</option></select></label>
      <label class="help" style="flex:1">Clients / jour
        <select id="cper"><option value="6">6 (4–7)</option><option value="5">5</option><option value="7">7</option><option value="4">4</option></select></label>
    </div>
    <label class="help" style="display:block;margin-top:8px"><input type="checkbox" id="cprio" checked> Prioriser par score (segment × retard × potentiel)</label>
    <button class="btn" id="genBtn" style="width:100%;margin-top:8px">🧮 Générer le planning</button>
    <button class="btn sec" id="planExport" style="width:100%;margin-top:8px">⬇️ Exporter le planning (Excel)</button>
    <div class="help" id="campNote"></div>
  </div>
  <div class="list" id="camplist"></div>
</div>

<div id="view-ana" style="display:none">
  <div class="kpis" id="kpis"></div>
  <div class="controls" style="background:transparent;border:0;padding-top:0">
    <div class="row">
      <select id="anaSort">
        <option value="score">Trier : score priorité ↓</option>
        <option value="vph">Trier : valeur / heure ↓</option>
        <option value="time">Trier : temps investi ↓</option>
        <option value="pot">Trier : potentiel ↓</option>
        <option value="rate">Trier : taux commande ↑</option>
      </select>
    </div>
    <div class="row" style="margin-top:8px">
      <button class="btn sec sm" id="impBtn">📥 Importer référentiel CSV</button>
      <button class="btn sec sm" id="histBtn">⬇️ Export historique</button>
    </div>
    <div class="help" id="refNote"></div>
  </div>
  <div class="list" id="dash" style="padding-top:0"></div>
</div>

<div class="foot">
  <button class="btn sec" id="exportBtn">⬇️ CSV</button>
  <button class="btn sec" id="backupBtn">💾 Sauver</button>
  <button class="btn sec" id="shareBtn">📤 Partager</button>
  <button class="btn sec" id="restoreBtn">↩️ Restaurer</button>
</div>
<input type="file" id="fileIn" accept=".json" style="display:none">
<input type="file" id="csvIn" accept=".csv,.txt" style="display:none">
<div id="addModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:14px;max-width:430px;width:100%;padding:16px;max-height:92vh;overflow:auto">
    <h3 style="margin:0 0 10px;color:#16456f;font-size:16px">➕ Nouveau client / prospect</h3>
    <div class="fld"><label>Nom *</label><input id="ac_nom" placeholder="Nom du client"></div>
    <div class="fld"><label>Zone</label><select id="ac_zone"></select></div>
    <div class="fld"><label>Ville</label><input id="ac_ville" placeholder="Ville"></div>
    <div class="fld"><label>Priorité</label><select id="ac_prio"><option value="C">C</option><option value="B">B</option><option value="A">A</option></select></div>
    <div class="fld"><label>Latitude</label><input id="ac_lat" inputmode="decimal" placeholder="ex: 30.4202"></div>
    <div class="fld"><label>Longitude</label><input id="ac_lon" inputmode="decimal" placeholder="ex: -9.5982"></div>
    <div class="acts"><button class="btn sm sec" id="ac_here">📍 Je suis ici</button></div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#5f6b7a;margin:10px 0"><input type="checkbox" id="ac_prospect" checked> Marquer comme prospect</label>
    <div class="acts"><button class="btn ok" id="ac_save">Enregistrer</button><button class="btn sec" id="ac_cancel">Annuler</button></div>
    <div class="help" id="ac_msg"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

const KEY='tournee_state_v3';
function _lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function _lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
let state = JSON.parse(_lsGet(KEY)||_lsGet('tournee_state_v2')||_lsGet('tournee_state_v1')||'{}');
let myPos=null;
const filters={open:false,hidevis:false,prio:false,retard:false,prioA:false};
const todayStr=()=>new Date().toISOString().slice(0,10);
const now=()=>Date.now();
function save(){_lsSet(KEY,JSON.stringify(state));}
function st(code){return state[code]||(state[code]={});}
function meta(){return state.__meta||(state.__meta={});}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}
function hhmm(ts){const d=new Date(ts);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function fmtDur(m){m=Math.round(m);if(m<60)return m+' min';return Math.floor(m/60)+'h'+('0'+(m%60)).slice(-2);}
function fmtDH(n){if(n==null)return '—';return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' DH';}
function fmtK(n){if(n==null)return '—';return n>=1000?(Math.round(n/100)/10)+'k':Math.round(n)+'';}
function norm(s){if(s==null)return '';s=String(s).trim().toLowerCase();
  s=s.normalize('NFD').replace(/[̀-ͯ]/g,'');s=s.replace(/[^a-z0-9]+/g,' ').trim().replace(/\s+/g,' ');return s;}

/* referentiel = embedded + imported overrides */
function refMap(){return Object.assign({},REF_EMB,(state.__ref||{}));}
let RMAP={};
function refOf(c){return RMAP[norm(c.nom)]||null;}
const FREQDAYS={'Toutes les 2 semaines':14,'Mensuelle':30,'Trimestrielle':90,'À réactiver / qualifier':60};
const SEGW={A:4,B:2,C:1,INACTIF:0.5};

function eff(c){const s=state[c.code]||{};
  return {...c,lat:s.lat!=null?s.lat:c.lat,lon:s.lon!=null?s.lon:c.lon,gps_exact:s.lat!=null?true:c.gps_exact,
   midi_debut:s.midi_debut!=null?s.midi_debut:c.midi_debut,midi_fin:s.midi_fin!=null?s.midi_fin:c.midi_fin,
   jours:s.jours!=null?s.jours:(c.jours_fermes||''),statut:s.statut||null,rdv:s.rdv||'',note:s.note||'',
   absent:s.absent||'',visitDate:s.visitDate||'',cur:s._cur||null,visits:s.visits||[]};}
function hav(a,b,c,d){const R=6371,r=Math.PI/180;const dLa=(c-a)*r,dLo=(d-b)*r;
  const x=Math.sin(dLa/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function dKm(a,b){return hav(a.lat,a.lon,b.lat,b.lon);}
function closedNow(e){const d=new Date();
  if(e.absent==='semaine')return "Absent (semaine)";
  if(e.absent==='jour'&&(state[e.code]||{}).absentDate===todayStr())return "Absent aujourd'hui";
  const jn=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'][d.getDay()];
  if(e.jours&&e.jours.toLowerCase().includes(jn))return 'Fermé ('+jn+')';
  if(e.midi_debut&&e.midi_fin){const cur=d.getHours()*60+d.getMinutes();
    const p=t=>{const m=String(t).match(/(\d{1,2})[:hH]?(\d{2})?/);return m?(+m[1])*60+(+(m[2]||0)):null;};
    const a=p(e.midi_debut),f=p(e.midi_fin);if(a!=null&&f!=null&&cur>=a&&cur<f)return 'Fermé (pause midi)';}
  return null;}
function wazeLink(p){return 'https://waze.com/ul?ll='+p.lat+','+p.lon+'&navigate=yes';}

function stats(code){const v=(state[code]||{}).visits||[];
  const nb=v.length,totMin=v.reduce((s,x)=>s+(x.mins||0),0),orders=v.filter(x=>x.commande).length;
  const rate=nb?orders/nb:0,avg=nb?totMin/nb:0;
  let lastDate=null;v.forEach(x=>{if(x.date&&(!lastDate||x.date>lastDate))lastDate=x.date;});
  return {nb,totMin,orders,rate,avg,lastDate};}
function daysSince(d){if(!d)return null;return Math.round((Date.now()-new Date(d+'T00:00:00').getTime())/86400000);}

/* full metric bundle for a client */
let MEDIAN_VPH=0;
function metric(c){const S=stats(c.code),R=refOf(c);
  const vph=(R&&S.totMin>0)?R.potentiel/(S.totMin/60):null;
  const fd=R?(FREQDAYS[R.freq]||30):null;
  const ds=daysSince(S.lastDate);
  let retard=false,retardTxt='';
  if(R&&R.segment!=='INACTIF'){if(ds==null){retard=S.nb===0;retardTxt=S.nb===0?'Jamais visité':'';}
    else if(ds>fd){retard=true;retardTxt='En retard '+ds+'j';}}
  let recence= ds==null?2.0:Math.max(0.1,Math.min(4,ds/(fd||30)));
  const w=R?(SEGW[R.segment]??1):0.8;
  const pot=R?R.potentiel:0;
  const score=R?(w*recence*(pot/1000)):0;
  // alerts
  const aReconq=R&&(R.statut==='Perdu'||R.segment==='INACTIF');
  const aEros=R&&R.statut==='En baisse';
  const lowVph=(vph!=null&&MEDIAN_VPH>0&&vph<MEDIAN_VPH);
  const chrono=(S.nb>=2&&S.totMin>=90&&S.rate<0.30&&(vph==null||lowVph));
  const good=(S.nb>=2&&S.rate>=0.60);
  return {S,R,vph,fd,ds,retard,retardTxt,score,recence,aReconq,aEros,chrono,good};}
function computeMedianVPH(){const arr=[];CLIENTS.forEach(c=>{const S=stats(c.code),R=refOf(c);
  if(R&&S.totMin>0)arr.push(R.potentiel/(S.totMin/60));});
  arr.sort((a,b)=>a-b);MEDIAN_VPH=arr.length?arr[Math.floor(arr.length/2)]:0;}

/* tabs */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  const v=t.dataset.tab;
  document.getElementById('view-today').style.display=v==='today'?'':'none';
  document.getElementById('view-camp').style.display=v==='camp'?'':'none';
  document.getElementById('view-ana').style.display=v==='ana'?'':'none';
  if(v==='ana')renderDash();});
function fillZones(sel){const z=[...new Set(CLIENTS.map(c=>c.zone))].sort();
  sel.innerHTML='<option value="">— Toutes les zones —</option>'+z.map(x=>`<option value="${x}">${x} (${CLIENTS.filter(c=>c.zone===x).length})</option>`).join('');}

/* ============ TODAY ============ */
function render(){
  computeMedianVPH();
  const zone=document.getElementById('zone').value;
  let arr=CLIENTS.filter(c=>!zone||c.zone===zone).map(c=>{const e=eff(c);e._m=metric(c);return e;});
  arr.forEach(e=>{e._closed=closedNow(e);e._done=(e.statut==='visite'&&e.visitDate===todayStr());
    if(myPos&&e.lat!=null)e._d=hav(myPos.lat,myPos.lon,e.lat,e.lon);});
  if(filters.open)arr=arr.filter(e=>!e._closed);
  if(filters.hidevis)arr=arr.filter(e=>!e._done);
  if(filters.retard)arr=arr.filter(e=>e._m.retard);
  if(filters.prioA)arr=arr.filter(e=>e._m.R&&e._m.R.segment==='A');
  arr.sort((a,b)=>{if(!!b.cur-!!a.cur)return !!b.cur-!!a.cur;
    if(filters.prio)return b._m.score-a._m.score;
    if(myPos)return (a._d??1e9)-(b._d??1e9);
    return (a.zone+a.ville+a.nom).localeCompare(b.zone+b.ville+b.nom);});
  document.getElementById('count').textContent=arr.length+' client(s)'+(filters.prio?' · triés par priorité':myPos?' · triés par proximité':'');
  const L=document.getElementById('list');
  if(!arr.length){L.innerHTML='<div class="empty">Aucun client avec ces filtres.</div>';return;}
  L.innerHTML=arr.map(card).join('');arr.forEach(e=>bind(e.code));
}
function segBadge(R){if(!R)return '<span class="b pc">Hors référentiel</span>';
  const cls={A:'pa',B:'pb',C:'pc',INACTIF:'pin'}[R.segment]||'pc';return `<span class="b ${cls}">Seg ${R.segment}</span>`;}
function statBadge(R){if(!R)return '';const c={'En hausse':'hausse','En baisse':'baisse','Nouveau':'nouveau','Perdu':'reconq'}[R.statut]||'stat';return `<span class="b ${c}">${R.statut}</span>`;}
function card(e){
  const m=e._m,R=m.R,S=m.S;
  const d=e._d!=null?(e._d<1?Math.round(e._d*1000)+' m':e._d.toFixed(1)+' km'):'';
  let b=segBadge(R)+statBadge(R);
  if(e.prospect)b+='<span class="b nouveau">🆕 Prospect</span>';
  b+=e.gps_exact?'<span class="b exact">GPS exact</span>':'<span class="b approx">GPS approx</span>';
  if(e.cur)b+='<span class="b live">🟢 En cours</span>';
  if(e._done&&!e.cur)b+='<span class="b visite">Visité ✓</span>';
  if(e.statut==='revisite')b+='<span class="b revis">À revisiter</span>';
  if(e.statut==='rdv')b+=`<span class="b rdv">RDV ${e.rdv||''}</span>`;
  if(e._closed)b+=`<span class="b ferme">${e._closed}</span>`;
  if(m.retard)b+=`<span class="b retard">⏰ ${m.retardTxt}</span>`;
  if(m.aReconq)b+='<span class="b reconq">🔄 À reconquérir</span>';
  if(m.aEros)b+='<span class="b eros">📉 CA en érosion</span>';
  if(m.chrono)b+='<span class="b alert">⚠️ Chronophage peu rentable</span>';
  if(m.good)b+='<span class="b good">⭐ Bon client</span>';
  let rl='';
  if(R){rl=`<div class="refline">💰 Potentiel ${fmtDH(R.potentiel)} · CA25 ${fmtDH(R.ca25)} · 🎯 ${R.freq}`
    +(m.vph!=null?` · ⏱ ${fmtDH(m.vph)}/h`:'')+(m.score?` · score ${Math.round(m.score)}`:'')+`</div>`;}
  return `<div class="card ${e._done&&!e.cur?'done':''}" id="c_${e.code}">
   <div class="ctop"><div><div class="nom">${e.nom}</div><div class="meta">${e.ville} · ${e.zone} · #${e.code}</div></div><div class="dist">${d}</div></div>
   ${rl}<div class="badges">${b}</div>
   <div class="acts"><button class="btn nav" data-a="nav">🧭 Naviguer</button><button class="btn sec sm" data-a="toggle">⚙️ Visite / statut</button></div>
   <div class="panel" id="p_${e.code}">${panel(e,m)}</div></div>`;
}
function panel(e,m){const S=m.S;let h='';

function optDay(start,pts){if(pts.length<=1)return pts.slice();let rem=pts.slice(),order=[],last=start;
 while(rem.length){rem.sort((a,b)=>dKm(last,a)-dKm(last,b));order.push(last=rem.shift());}
 const L=o=>{let s=dKm(start,o[0]);for(let i=0;i<o.length-1;i++)s+=dKm(o[i],o[i+1]);return s;};
 let imp=true;while(imp){imp=false;for(let i=0;i<order.length-1;i++)for(let k=i+1;k<order.length;k++){const no=order.slice(0,i).concat(order.slice(i,k+1).reverse(),order.slice(k+1));if(L(no)<L(order)-1e-9){order=no;imp=true;}}}return order;}
function planCampaign(){
  computeMedianVPH();
  const zone=document.getElementById('czone').value,hotel=meta().hotel;
  if(!zone){toast('Choisissez une zone');return;}if(!hotel){toast('Définissez l\'hôtel');return;}
  const daysMax=+document.getElementById('cdays').value,per=+document.getElementById('cper').value;
  const usePrio=document.getElementById('cprio').checked;
  let pool=CLIENTS.filter(c=>c.zone===zone&&c.lat!=null).map(c=>{const e=eff(c);e._m=metric(c);return e;});
  const cap=daysMax*7;let dropped=0;
  if(pool.length>cap){pool.sort((a,b)=>usePrio?(b._m.score-a._m.score):((({A:0,B:1,C:2,INACTIF:3})[(a._m.R||{}).segment]??4)-(({A:0,B:1,C:2,INACTIF:3})[(b._m.R||{}).segment]??4)));dropped=pool.length-cap;pool=pool.slice(0,cap);}
  let needed=Math.min(daysMax,Math.max(1,Math.ceil(pool.length/per)));
  let sizes=[],base=Math.floor(pool.length/needed),extra=pool.length%needed;
  for(let i=0;i<needed;i++)sizes.push(base+(i<extra?1:0));
  // seeds prioritised by score so high-priority clients anchor early days
  let rem=pool.slice();const days=[];
  for(let d=0;d<needed&&rem.length;d++){let target=sizes[d];if(d===needed-1)target=rem.length;target=Math.min(7,Math.max(1,target));
    if(usePrio)rem.sort((a,b)=>b._m.score-a._m.score); else rem.sort((a,b)=>dKm(hotel,a)-dKm(hotel,b));
    let day=[rem.shift()];
    while(day.length<target&&rem.length){const last=day[day.length-1];rem.sort((a,b)=>dKm(last,a)-dKm(last,b));day.push(rem.shift());}
    days.push(optDay(hotel,day));}
  meta().campaign={zone,hotel,days:days.map(dd=>dd.map(c=>c.code)),dropped};save();renderCampaign();
  document.getElementById('campNote').textContent=`Zone ${zone} · ${pool.length} clients sur ${days.length} jour(s)`+(usePrio?' · ordre par priorité':'')+(dropped?` · ${dropped} reportés`:'');
}

        <a class="btn nav sm" href="${wazeLink(p)}" style="text-decoration:none;align-self:center">🧭</a></div>`;});
    html+=`<div class="daybox"><div class="dayhdr" data-day="${di}">📅 Jour ${di+1} — ${pts.length} clients <span>${total.toFixed(1)} km ▾</span></div>

  if(cp.dropped)html+=`<div class="help" style="padding:0 4px">${cp.dropped} client(s) non planifié(s) — augmentez la durée.</div>`;
  L.innerHTML=html;L.querySelectorAll('.dayhdr').forEach(h=>h.onclick=()=>document.getElementById('day_'+h.dataset.day).classList.toggle('open'));
}

function parseCSV(txt){txt=txt.replace(/^﻿/,'');const delim=(txt.split('\n')[0].split(';').length>txt.split('\n')[0].split(',').length)?';':',';
  const rows=[];let i=0,f='',row=[],q=false;
  while(i<txt.length){const ch=txt[i];
    if(q){if(ch=='"'){if(txt[i+1]=='"'){f+='"';i++;}else q=false;}else f+=ch;}
    else{if(ch=='"')q=true;else if(ch==delim){row.push(f);f='';}else if(ch=='\n'||ch=='\r'){if(ch=='\r'&&txt[i+1]=='\n')i++;row.push(f);f='';if(row.some(x=>x.trim()!==''))rows.push(row);row=[];}else f+=ch;}
    i++;}
  if(f!==''||row.length){row.push(f);if(row.some(x=>x.trim()!==''))rows.push(row);}
  return rows;}
function importRefCSV(txt){
  const rows=parseCSV(txt);if(rows.length<2){toast('CSV vide');return;}
  const H=rows[0].map(x=>norm(x));
  const idx=(names)=>{for(const n of names){const i=H.indexOf(norm(n));if(i>=0)return i;}return -1;};
  const iC=idx(['Client','nom']),iV=idx(['Ville']),i24=idx(['CA 2024 (DH)','CA 2024','ca2024']),i25=idx(['CA 2025 (DH)','CA 2025','ca2025']),
    iSeg=idx(['Segment']),iSta=idx(['Statut']),iPot=idx(['Potentiel (DH)','Potentiel']),iFreq=idx(['Frequence visite conseillee','Fréquence visite conseillée','Frequence','Fréquence']);
  if(iC<0){toast('Colonne Client introuvable');return;}
  const num=s=>{if(s==null)return 0;const v=parseFloat(String(s).replace(/[^0-9.\-]/g,''));return isNaN(v)?0:v;};
  const m={};let n=0;
  for(let r=1;r<rows.length;r++){const R=rows[r];const cl=R[iC];if(!cl||!cl.trim())continue;
    m[norm(cl)]={ville:iV>=0?R[iV]:'',ca24:i24>=0?Math.round(num(R[i24])):0,ca25:i25>=0?Math.round(num(R[i25])):0,
      segment:iSeg>=0?(R[iSeg]||'').trim():'C',statut:iSta>=0?(R[iSta]||'').trim():'',
      potentiel:iPot>=0?Math.round(num(R[iPot])):0,freq:iFreq>=0?(R[iFreq]||'').trim():'Mensuelle'};n++;}
  state.__ref=m;save();RMAP=refMap();toast(n+' clients importés dans le référentiel');renderDash();render();
}

document.getElementById('addBtn').onclick=()=>{
  const sel=document.getElementById('ac_zone');const zs=[...new Set(CLIENTS.map(c=>c.zone))].sort();
  sel.innerHTML=zs.map(z=>'<option value="'+z+'">'+z+'</option>').join('')+'<option value="__new">+ Nouvelle zone…</option>';
  document.getElementById('ac_nom').value='';document.getElementById('ac_ville').value='';
  document.getElementById('ac_lat').value='';document.getElementById('ac_lon').value='';
  document.getElementById('ac_prospect').checked=true;document.getElementById('ac_msg').textContent='';
  addModal.style.display='flex';
};
document.getElementById('ac_cancel').onclick=()=>addModal.style.display='none';
document.getElementById('ac_here').onclick=()=>{if(!navigator.geolocation){toast('Geoloc indisponible');return;}
  document.getElementById('ac_msg').textContent='Localisation…';
  navigator.geolocation.getCurrentPosition(p=>{document.getElementById('ac_lat').value=p.coords.latitude.toFixed(6);document.getElementById('ac_lon').value=p.coords.longitude.toFixed(6);document.getElementById('ac_msg').textContent='Position capturee ✓';},
  ()=>{document.getElementById('ac_msg').textContent='Position refusee';},{enableHighAccuracy:true,timeout:10000});};
document.getElementById('ac_zone').onchange=function(){if(this.value==='__new'){const z=prompt('Nom de la nouvelle zone :');if(z){const o=document.createElement('option');o.value=z;o.textContent=z;this.insertBefore(o,this.firstChild);this.value=z;}else this.selectedIndex=0;}};
document.getElementById('ac_save').onclick=()=>{
  const nom=document.getElementById('ac_nom').value.trim();
  if(!nom){document.getElementById('ac_msg').textContent='Le nom est obligatoire.';return;}
  let zone=document.getElementById('ac_zone').value;if(zone==='__new')zone='AUTRE';
  const ville=document.getElementById('ac_ville').value.trim()||zone;
  const lat=parseFloat(document.getElementById('ac_lat').value),lon=parseFloat(document.getElementById('ac_lon').value);
  const hasGPS=!isNaN(lat)&&!isNaN(lon);
  if(!hasGPS){document.getElementById('ac_msg').textContent='Ajoutez la position (📍 Je suis ici ou coordonnees).';return;}
  const c={code:'P'+Date.now(),nom:nom,ville:ville,zone:zone,lat:lat,lon:lon,midi_debut:null,midi_fin:null,jours_fermes:null,statut:'Actif',priorite:document.getElementById('ac_prio').value,gps_exact:true,prospect:document.getElementById('ac_prospect').checked};
  (state.__clients=state.__clients||[]).push(c);CLIENTS.push(c);save();
  addModal.style.display='none';toast('Client ajoute');
  fillZones(document.getElementById('zone'));const cz2=document.getElementById('czone');fillZones(cz2);cz2.querySelector('option[value=""]').textContent='— Choisir une zone —';
  render();
};

/* init */
function startApp(){
  mergeUserClients();
  fillZones(document.getElementById('zone'));
  const cz=document.getElementById('czone');fillZones(cz);cz.querySelector('option[value=""]').textContent='— Choisir une zone —';
  setHotelInfo();render();renderCampaign();
}
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function tryUnlock(pass){
  try{const salt=b64d(ENC.salt),iv=b64d(ENC.iv),ct=b64d(ENC.ct);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:ENC.iters,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
    const data=JSON.parse(new TextDecoder().decode(pt));CLIENTS=data.clients;REF_EMB=data.ref;return true;}catch(e){return false;}
}
async function doUnlock(pass,remember){const ok=await tryUnlock(pass);
  if(ok){if(remember)_lsSet('tournee_pin',pass);var ls=document.getElementById('lockscreen');if(ls)ls.style.display='none';startApp();return true;}return false;}
(function(){var lb=document.getElementById('unlockBtn'),pin=document.getElementById('pin'),err=document.getElementById('pinErr');
  lb.addEventListener('click',async function(){err.textContent='Vérification…';try{var ok=await doUnlock(pin.value.trim(),document.getElementById('remember').checked);if(!ok)err.textContent='Code incorrect.';}catch(e){err.textContent='Erreur : '+e.message;}});
  pin.addEventListener('keydown',function(e){if(e.key==='Enter')lb.click();});
  (async function(){var saved=_lsGet('tournee_pin');if(saved&&await tryUnlock(saved)){var ls=document.getElementById('lockscreen');if(ls)ls.style.display='none';startApp();}else{setTimeout(function(){try{pin.focus();}catch(e){}},200);}})();
})();
</script>
